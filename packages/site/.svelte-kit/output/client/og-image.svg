      <stop offset="0%" style="stop-color:#f8f7f4"/>
      <stop offset="100%" style="stop-color:#f0eeeb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
